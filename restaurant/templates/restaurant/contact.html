{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | THE ANGELS RESTAURANT</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gold: #d4af37;
            --accent-yellow: #facc15;
            --glass-bg: rgba(15, 15, 15, 0.9);
            --text-light: #f4f4f4;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background: #0a0a0a;
            color: var(--text-light);
            overflow: hidden; /* Prevents scroll on desktop for a clean look */
        }

        .page-wrapper {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url("{% static 'images/BG.png' %}") no-repeat center center / cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .contact-card {
            max-width: 550px;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: var(--primary-gold);
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .subtitle {
            margin-bottom: 40px;
            color: #aaa;
            font-weight: 300;
            font-size: 0.95rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            margin-bottom: 40px;
        }

        .contact-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .icon {
            font-size: 22px;
            margin-bottom: 8px;
            color: var(--accent-yellow);
        }

        .details h3 {
            margin: 0;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary-gold);
            opacity: 0.8;
        }

        .details p {
            margin: 4px 0 0;
            font-size: 1.1rem;
            color: #eee;
            line-height: 1.4;
        }

        .btn {
            display: inline-block;
            padding: 14px 45px;
            background: transparent;
            color: var(--primary-gold);
            border: 1px solid var(--primary-gold);
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 13px;
        }

        .btn:hover {
            background: var(--primary-gold);
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        @media (max-width: 480px) {
            .contact-card { padding: 30px 20px; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<div class="page-wrapper">
    <div class="contact-card">
        
        <h1>Contact Us</h1>
        <p class="subtitle">Reservations & Inquiries</p>

        <div class="info-grid">
            <div class="contact-item">
                <div class="icon">📍</div>
                <div class="details">
                    <h3>Location</h3>
                    <p>Main Road, Vadodara, Gujarat</p>
                </div>
            </div>

            <div class="contact-item">
                <div class="icon">📞</div>
                <div class="details">
                    <h3>Phone</h3>
                    <p>+91 97019 90126</p>
                </div>
            </div>

            <div class="contact-item">
                <div class="icon">✉️</div>
                <div class="details">
                    <h3>Email</h3>
                    <p>lalithcharan@gmail.com</p>
                </div>
            </div>

            <div class="contact-item">
                <div class="icon">⏰</div>
                <div class="details">
                    <h3>Hours</h3>
                    <p>10:00 AM – 11:00 PM</p>
                </div>
            </div>
        </div>

        <a href="/" class="btn">Back to Home</a>
        
    </div>
</div>

</body>
</html>
